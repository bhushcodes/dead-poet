<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGLISH POEM MENU</title>
    <link rel="icon" type="image/x-icon" href="/Favicon/favicon.ico">
    <link rel="stylesheet" href="english-poem-menu.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap');
        .user-section { position: fixed; top: 0.8rem; right: 0.8rem; display: flex; align-items: center; gap: 0.4rem; z-index: 100; }
        .user-btn { height: 2rem; padding: 0 1rem; background: #ffffff; border: 0.08rem solid rgba(34, 38, 55, 0.16); border-radius: 999px; cursor: pointer; font-family: 'Lexend Mega', serif; font-size: 0.6rem; text-decoration: none; color: #222637; transition: all 0.2s; display: flex; align-items: center; justify-content: center; white-space: nowrap; }
        .user-btn:hover { background: rgba(233, 95, 74, 0.1); border-color: rgba(233, 95, 74, 0.3); }
        .user-btn.primary { background: #e95f4a; color: white; border-color: #e95f4a; }
        .user-btn.primary:hover { background: #d84f3a; }
        .user-avatar { width: 1.5rem; height: 1.5rem; border-radius: 50%; object-fit: cover; margin-right: 0.3rem; }
        
        @media (max-width: 480px) {
            .user-section { 
                top: 3.5rem; 
                right: 0.5rem; 
                gap: 0.25rem; 
            }
            .user-btn { 
                height: 1.8rem; 
                padding: 0 0.7rem; 
                font-size: 0.55rem; 
            }
            .user-avatar { 
                width: 1.2rem; 
                height: 1.2rem; 
                margin-right: 0.2rem; 
            }
        }
        
        @media (max-width: 360px) {
            .user-section { 
                top: 3.2rem; 
                right: 0.35rem; 
                gap: 0.1rem; 
                flex-wrap: nowrap;
            }
            .user-btn { 
                height: 1.5rem; 
                padding: 0 0.35rem; 
                font-size: 0.4rem; 
            }
            .user-btn .user-name {
                display: none;
            }
            .user-section .user-btn:first-child .user-name {
                display: inline;
            }
        }
        
        @media (max-width: 320px) {
            .user-section {
                top: 3rem;
                gap: 0.05rem;
            }
            .user-btn {
                padding: 0 0.25rem;
                font-size: 0.35rem;
            }
            .user-avatar {
                width: 0.9rem;
                height: 0.9rem;
                margin-right: 0.1rem;
            }
            .user-btn .user-name {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="user-section" id="userSection"><a href="login.html" class="user-btn primary">LOGIN</a></div>
    <div class="poem-div" id="poemList">
        <h1>LIST OF POEMS</h1>
    </div>
    <script src="script.js" defer></script>
    <script src="api.js" defer></script>
    <script>
        function updateUserSection() { const savedUser = localStorage.getItem('user'); const userSection = document.getElementById('userSection'); if (savedUser) { const user = JSON.parse(savedUser); userSection.innerHTML = '<a href="profile.html" class="user-btn"><img src="' + (user.photoURL || 'https://www.google.com/favicon.ico') + '" class="user-avatar" alt="Profile"><span class="user-name">' + (user.displayName || 'Profile') + '</span></a><button class="user-btn" onclick="logout()">LOGOUT</button>'; } else { userSection.innerHTML = '<a href="login.html" class="user-btn primary">LOGIN</a>'; } }
        function logout() { localStorage.removeItem('user'); updateUserSection(); window.location.href = 'menu.html'; }
        updateUserSection();

        const fallbackPosts = [
            { title: 'Unheard', href: 'post.html?slug=unheard' },
            { title: 'Bound', href: 'post.html?slug=bound' },
            { title: 'Last Year', href: 'post.html?slug=last-year' }
        ];

        function renderFallback(container) {
            let html = '<h1>LIST OF POEMS</h1>';
            fallbackPosts.forEach((post) => {
                html += '<a href="' + post.href + '"><p>' + post.title + '</p></a>';
            });
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('poemList');
            try {
                const response = await api.getPosts('poem', 'english');
                if (response.success && Array.isArray(response.posts) && response.posts.length > 0) {
                    let html = '<h1>LIST OF POEMS</h1>';
                    response.posts.forEach(post => { html += '<a href="post.html?slug=' + post.slug + '"><p>' + post.title + '</p></a>'; });
                    container.innerHTML = html;
                    return;
                }
            } catch (_error) {
            }

            renderFallback(container);
        });
    </script>
</body>
</html>
